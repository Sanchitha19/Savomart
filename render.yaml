services:
  - type: web
    name: savomart-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: ENV
        value: production
      - key: FRONTEND_URL
        value: https://your-app.vercel.app
